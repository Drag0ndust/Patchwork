name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macOS
            arch: arm64
            runner: macos-15
            install-swift: false
          - os: macOS
            arch: x86_64
            runner: macos-13
            install-swift: true
          - os: Linux
            arch: x86_64
            runner: ubuntu-latest
            install-swift: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift 6 toolchain
        if: matrix.install-swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.0"

      - name: Print Swift version
        run: swift --version

      - name: Build
        run: swift build -c debug

      - name: Test
        run: swift test
